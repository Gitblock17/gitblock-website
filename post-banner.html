<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
body{margin:0;width:1200px;height:675px;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#0f172a 50%,#0a0a1a 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,0.15),transparent 70%);border-radius:50%}
body::after{content:'';position:absolute;bottom:-100px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(16,185,129,0.1),transparent 70%);border-radius:50%}
.card{position:relative;z-index:1;display:flex;align-items:center;gap:48px;padding:48px 64px;max-width:1100px}
.logo-area{flex-shrink:0}
.logo-area img{width:160px;height:160px;border-radius:32px;box-shadow:0 8px 40px rgba(37,99,235,0.3)}
.text-area{flex:1}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399;font-size:16px;font-weight:600;padding:6px 18px;border-radius:100px;margin-bottom:20px}
.badge .dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:44px;font-weight:900;color:#fff;line-height:1.15;margin:0 0 12px 0}
h1 span{background:linear-gradient(135deg,#34d399,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:20px;color:#94a3b8;line-height:1.5;margin-bottom:24px;max-width:600px}
.stats{display:flex;gap:32px;margin-bottom:24px}
.stat{text-align:center}
.stat .num{font-size:28px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace}
.stat .lbl{font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:14px 32px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(37,99,235,0.3)}
.url{position:absolute;bottom:40px;right:64px;color:#475569;font-size:16px;font-weight:600;letter-spacing:1px}
</style></head><body>
<div class="card">
<div class="logo-area"><img src="assets/gitblock.jpg" alt="GitBlock"></div>
<div class="text-area">
<div class="badge"><span class="dot"></span> Now Live</div>
<h1>Run a Node.<br><span>Get Free Unlimited API.</span></h1>
<p class="subtitle">Contribute your GPU to the GitBlock network. Earn $GITBLOCK rewards while getting unlimited free AI inference. No API keys. No credit cards.</p>
<div class="stats">
<div class="stat"><div class="num">80+</div><div class="lbl">Models</div></div>
<div class="stat"><div class="num">Free</div><div class="lbl">API Access</div></div>
<div class="stat"><div class="num">$GITBLOCK</div><div class="lbl">Earnings</div></div>
</div>
<div class="cta">gitblock.org/node</div>
</div>
</div>
<div class="url">gitblock.org</div>
</body></html>
