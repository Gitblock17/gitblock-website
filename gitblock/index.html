<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitBlock Scanner — Base Token Discovery</title>
<link rel="icon" href="gitblock-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060e;--srf:rgba(10,10,24,0.9);--brd:rgba(37,99,235,0.14);--txt:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--ac:#3b82f6;--ac2:#60a5fa;--ac-glow:rgba(37,99,235,0.12);--gn:#22c55e;--rd:#ef4444;--or:#ea580c;--yl:#ca8a04;--ra:10px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(37,99,235,0.04)1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.tb{position:sticky;top:0;z-index:100;background:rgba(6,6,14,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:10px 0}
.ti{max-width:1500px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lg{font-weight:700;font-size:1.05rem;white-space:nowrap;display:flex;align-items:center;gap:7px;color:var(--ac2)}
.ld{width:7px;height:7px;border-radius:50%;background:var(--gn);animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
.sb{flex:1;min-width:160px;position:relative}
.sb input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--brd);border-radius:10px;font-size:.85rem;font-family:inherit;background:var(--srf);color:var(--txt);outline:none}
.sb input::placeholder{color:var(--t3)}
.sb input:focus{border-color:var(--ac)}
.sb i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.8rem}
.fs{padding:9px 12px;border:1px solid var(--brd);border-radius:10px;font-size:.82rem;font-family:inherit;background:var(--srf);color:var(--txt);cursor:pointer;outline:none;min-width:110px}
.fs:focus{border-color:var(--ac)}
.fs option{background:var(--bg);color:var(--txt)}

.sr{max-width:1500px;margin:0 auto;padding:12px 16px;display:flex;gap:20px;font-size:.82rem;color:var(--t2);flex-wrap:wrap;align-items:center;position:relative;z-index:1}
.sr strong{color:var(--txt)}

/* 3D Flipping Logo Loader */
.loading{text-align:center;padding:60px 20px;color:var(--t2)}
.loading .flip-container{perspective:800px;width:80px;height:80px;margin:0 auto 20px}
.loading .flipper{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:flip3d 1.6s ease-in-out infinite}
.loading .flipper img{width:80px;height:80px;border-radius:16px}
@keyframes flip3d{0%{transform:rotateY(0deg)}50%{transform:rotateY(180deg)}100%{transform:rotateY(360deg)}}
.loading p{margin-top:16px;font-size:.9rem}

.empty{text-align:center;padding:50px;color:var(--t2)}
.empty i{font-size:2rem;display:block;margin-bottom:10px;color:var(--t3)}

/* Trending */
.trending{margin:0 0 12px;position:relative;z-index:1}
.trending h3{font-size:.78rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px;padding:0 16px}
.trending-row{display:flex;gap:10px;overflow-x:auto;padding:0 16px 8px;scroll-behavior:smooth;overflow:hidden}
.trending-scroll{display:flex;gap:10px;animation:scrollX 30s linear infinite}
.trending-scroll:hover{animation-play-state:paused}
@keyframes scrollX{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tcard{flex-shrink:0;width:180px;padding:12px 14px;background:var(--srf);border:1px solid var(--brd);border-radius:10px;cursor:pointer;transition:all .12s;text-decoration:none;color:var(--txt)}
.tcard:hover{border-color:var(--ac);transform:translateY(-2px)}
.tcard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tcard-logo{width:24px;height:24px;border-radius:50%;border:1px solid var(--brd);object-fit:cover;background:var(--srf)}
.tcard-logof{width:24px;height:24px;border-radius:50%;background:rgba(37,99,235,0.12);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--t3);font-weight:600}
.tcard-name{font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcard-price{font-size:.85rem;font-weight:700}
.tcard-vol{font-size:.7rem;color:var(--t2);margin-top:2px}
.tcard-change{font-size:.72rem;font-weight:600;margin-top:2px}

.tw{max-width:1500px;margin:0 auto;padding:0 16px 60px;overflow-x:auto;position:relative;z-index:1}
table{width:100%;border-collapse:collapse;font-size:.84rem}
tbody td{padding:12px;border-bottom:1px solid var(--brd);white-space:nowrap}
tbody tr{transition:background .15s,transform .1s;cursor:pointer}
tbody tr:hover{background:rgba(37,99,235,0.06)}
thead th{text-align:left;padding:12px 14px;font-weight:600;color:var(--t2);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--ac);white-space:nowrap;cursor:pointer;user-select:none;background:linear-gradient(to bottom,rgba(10,10,24,0.6),transparent)}
@keyframes highlightNew{0%{background:rgba(37,99,235,0.15)}100%{background:transparent}}

.tc{display:flex;align-items:center;gap:8px}
.tl,.tlf{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tl{border:1px solid var(--brd);object-fit:cover;background:var(--srf)}
.tlf{background:rgba(37,99,235,0.1);border:1px solid var(--brd);font-weight:600;font-size:.75rem;color:var(--t3)}
.tn{font-weight:600;color:var(--txt)}
.ts{color:var(--t2);font-size:.78rem;margin-left:3px}

.cb{padding:2px 7px;border-radius:5px;font-weight:600;font-size:.75rem}
.cu{background:rgba(34,197,94,0.12);color:var(--gn)}
.cd{background:rgba(239,68,68,0.12);color:var(--rd)}
.pb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:600}
.pad-icon{width:14px;height:14px;border-radius:3px;object-fit:cover}
.pc{background:rgba(37,99,235,0.12);color:#60a5fa}.pbk{background:rgba(139,92,246,0.12);color:#a78bfa}.pz{background:rgba(234,179,8,0.12);color:#facc15}.pv{background:rgba(236,72,153,0.12);color:#f472b6}.po{background:rgba(107,114,128,0.12);color:#9ca3af}

.sl{display:flex;gap:3px}
.sl a{color:var(--t3);font-size:.8rem;text-decoration:none;padding:2px}
.sl a:hover{color:var(--ac2)}

/* Stars */
.stars{display:inline-flex;gap:2px;cursor:pointer}
.stars i{color:rgba(255,255,255,0.1);font-size:.85rem;transition:color .1s}
.stars i.active{color:#f59e0b}
.stars.count{font-size:.7rem;color:var(--t2);margin-left:4px}

/* Modal */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}}
.mdl{background:var(--bg);border-radius:14px;width:100%;max-width:960px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .2s;margin:10px 0;border:1px solid var(--brd)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}}
.mt{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.mtl{width:48px;height:48px;border-radius:12px;border:1px solid var(--brd);object-fit:cover;flex-shrink:0;background:var(--srf)}
.mtlf{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(139,92,246,0.08));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:var(--ac2);flex-shrink:0}
.mtt{flex:1;min-width:0}
.mtt h3{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mtt .sy{color:var(--t2);font-size:.85rem}
.mtt .ad{font-family:monospace;font-size:.68rem;color:var(--t3);margin-top:2px;word-break:break-all}
.mx{width:32px;height:32px;border-radius:50%;border:none;background:var(--srf);color:var(--txt);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mx:hover{background:var(--brd)}
.mst{display:flex;gap:18px;padding:14px 24px;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.mst .st .lb{font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.mst .st .vl{font-weight:700;font-size:1rem;margin-top:1px}
.rating-row{display:flex;align-items:center;gap:8px;padding:8px 24px;border-bottom:1px solid var(--brd);font-size:.85rem}

.mtb{display:flex;border-bottom:1px solid var(--brd);padding:0 24px}
.mtb .tab{padding:12px 18px;font-size:.82rem;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:5px}
.mtb .tab:hover{color:var(--txt)}
.mtb .tab.active{color:var(--ac);border-bottom-color:var(--ac)}

.tab-chart{padding:12px 0;background:var(--bg)}
.tab-chart canvas{width:100%!important;max-height:380px}
.tab-chart .time-btns{display:flex;gap:6px;padding:8px 24px}
.tab-chart .time-btns button{padding:6px 14px;border:1px solid var(--brd);border-radius:8px;background:var(--srf);color:var(--txt);font-size:.78rem;font-family:inherit;cursor:pointer;font-weight:500}
.tab-chart .time-btns button.active{background:var(--ac);color:#fff;border-color:var(--ac)}

.tab-sec{padding:20px 24px}
.sec-overall{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:12px;margin-bottom:16px;font-weight:700;font-size:1.1rem}
.sec-critical{background:rgba(239,68,68,0.1);color:var(--rd);border:1px solid rgba(239,68,68,0.2)}
.sec-high{background:rgba(234,88,12,0.1);color:var(--or);border:1px solid rgba(234,88,12,0.2)}
.sec-medium{background:rgba(202,138,4,0.1);color:var(--yl);border:1px solid rgba(202,138,4,0.2)}
.sec-low{background:rgba(34,197,94,0.1);color:var(--gn);border:1px solid rgba(34,197,94,0.2)}
.sec-icon{font-size:1.4rem}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.sec-item{padding:10px 14px;border-radius:8px;background:var(--srf);border:1px solid var(--brd)}
.sec-item .lbl{font-size:.68rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.sec-item .val{font-weight:600;font-size:.88rem;margin-top:2px}
.sec-item .val.danger{color:var(--rd)}
.sec-item .val.warn{color:var(--or)}
.sec-item .val.ok{color:var(--gn)}
.flags{margin-top:14px}
.flags .flag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600;margin:2px 4px 2px 0;background:rgba(239,68,68,0.12);color:var(--rd)}

.tab-txns{padding:16px 24px;max-height:450px;overflow-y:auto}
.tab-snipers{padding:16px 24px;max-height:450px;overflow-y:auto}
.sniper-card{padding:12px 16px;margin-bottom:8px;border-radius:10px;border:1px solid var(--brd);display:flex;align-items:center;gap:14px;font-size:.82rem}
.sniper-card .sn-rank{width:28px;height:28px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0}
.sniper-card .sn-info{flex:1}
.sniper-card .sn-addr{font-family:monospace;font-weight:600;font-size:.78rem}
.sniper-card .sn-time{color:var(--t2);font-size:.75rem;margin-top:2px}
.sniper-card .sn-amt{font-weight:700;color:var(--txt)}
.sniper-card .sn-badge{padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:600;background:rgba(37,99,235,0.12);color:var(--ac2)}

.mln{display:flex;gap:8px;padding:14px 24px;border-top:1px solid var(--brd);flex-wrap:wrap}
.mln a{padding:9px 16px;border-radius:9px;text-decoration:none;font-weight:600;font-size:.82rem;border:1px solid var(--brd);color:var(--txt);display:flex;align-items:center;gap:5px}
.mln a:hover{border-color:var(--ac);color:var(--ac2)}
.mln a.ac{background:var(--ac);color:#fff;border-color:var(--ac)}
.mln a.ac:hover{background:#2563eb}

.nc{padding:5px 10px;border-radius:7px;background:rgba(37,99,235,0.12);color:var(--ac2);font-weight:600;font-size:.78rem;animation:popIn .3s}
@keyframes popIn{from{transform:scale(.8);opacity:0}}

@media(max-width:768px){.mst{gap:10px}.mst .st .vl{font-size:.85rem}.tc{gap:5px}}

/* Dark scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(37,99,235,0.3)}
</style>
</head>
<body>

<div class="tb"><div class="ti">
  <div class="lg"><img src="gitblock-logo.jpg" style="width:28px;height:28px;border-radius:6px;object-fit:cover"> GitBlock <div class="ld"></div></div>
  <div class="sb"><i class="fa fa-search"></i><input type="text" id="search" placeholder="Search any token on Base..." oninput="liveSearch()"></div>
  <select class="fs" id="ageFilter" onchange="poll()">
    <option value="">Any Time</option>
    <option value="5m">≤ 5 min</option>
    <option value="15m">≤ 15 min</option>
    <option value="1h">≤ 1 hour</option>
    <option value="6h">≤ 6 hours</option>
    <option value="24h">≤ 24 hours</option>
  </select>
</div></div>

<div class="trending" id="trendingBox" style="display:none">
  <h3>🔥 Trending</h3>
  <div class="trending-row" id="trendingRow"></div>
</div>

<div class="sr">
  <span>Liq: <strong id="stLiq">—</strong></span>
  <span>Vol 24h: <strong id="stVol">—</strong></span>
</div>

<div class="tw"><div id="content"><div class="loading">
  <div class="flip-container">
    <div class="flipper">
      <img src="gitblock-logo.jpg" alt="GitBlock">
    </div>
  </div>
  <p>Loading Base tokens...</p>
</div></div></div>
<div id="modal-root"></div>

<script>
const API='https://bytes-amp-tiles-punk.trycloudflare.com';
let tokens=[],seenAddrs=new Set(),newAddrs=new Set(),sortField='age',sortDir='asc',groupedMode=false;
let tokenRatings={};

async function loadRatings(addrs){
  if(!addrs.length)return;
  try{
    const r=await fetch(`${API}/v1/ratings?addresses=${addrs.map(encodeURIComponent).join(',')}`);
    const d=await r.json();
    if(d.ok)Object.assign(tokenRatings,d.data);
  }catch(e){}
}

async function rateToken(addr,stars){
  try{
    const r=await fetch(`${API}/v1/rating/${addr}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stars})});
    const d=await r.json();
    if(d.ok)tokenRatings[addr.toLowerCase()]=d.data;
    return d.ok?d.data:null;
  }catch(e){return null}
}

function renderStars(addr){
  const r=tokenRatings[addr.toLowerCase()]||{avg:0,count:0};
  let h='<span class="stars" onclick="rateTokenAndRefresh(\''+addr+'\',event)">';
  for(let i=1;i<=5;i++)h+=`<i class="fa${i<=Math.round(r.avg)?'-solid':'-regular'} fa-star ${i<=Math.round(r.avg)?'active':''}" data-star="${i}"></i>`;
  h+=`</span>`;
  if(r.count>0)h+=`<span class="stars count">${r.avg}★ (${r.count})</span>`;
  return h;
}

async function rateTokenAndRefresh(addr,e){
  const star=e.target.closest('i');
  if(!star)return;
  const s=parseInt(star.dataset.star);
  if(!s)return;
  await rateToken(addr,s);
  document.querySelectorAll(`[data-rating-addr="${addr}"]`).forEach(el=>el.innerHTML=renderStars(addr));
  const mr=document.getElementById('stars-container');
  if(mr)mr.innerHTML=renderStars(addr);
}
function fmtDateTime(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  const now=new Date();
  const diff=now-d;
  const s=Math.floor(diff/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function $(id){return document.getElementById(id)}
function fmtNum(n){if(n==null||isNaN(n))return'—';n=parseFloat(n);if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(2)+'K';return'$'+n.toFixed(2)}
function fmtPrice(n){if(n==null||isNaN(n))return'—';n=parseFloat(n);if(n>=1)return'$'+n.toFixed(2);if(n>=.01)return'$'+n.toFixed(4);if(n>=.0001)return'$'+n.toFixed(6);if(n<=.000001&&n>0)return'$'+n.toExponential(4);return'$'+n.toFixed(8)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function badge(pct){if(pct==null)return'<span class="cb">—</span>';const c=pct>=0?'cu':'cd';return`<span class="cb ${c}">${pct>=0?'↑':'↓'} ${Math.abs(pct).toFixed(1)}%</span>`}
function padClass(p){return'p'+(p==='clanker'?'c':p==='bankr'?'b':p==='zora'?'z':p==='virtuals'?'v':'o')}
function padLabel(p){const m={clanker:'<img class="pad-icon" src="clanker.png"> Clanker',bankr:'🔵 Bankr',zora:'🟡 Zora',virtuals:'🩷 Virtuals',other:'⚪ Other'};return m[p]||'⚪ Other'}
function logo(t,cls){if(t.image)return`<img class="${cls}" src="${t.image}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="${cls==='tl'?'tlf':'mtlf'}" style="display:none">?</div>`;return`<div class="${cls==='tl'?'tlf':'mtlf'}">?</div>`}

// Live search
let st=null;
function liveSearch(){
  clearTimeout(st);
  const q=$('search').value.trim();
  if(!q||q.length<2){render();return}
  st=setTimeout(async()=>{
    try{
      const r=await fetch(`${API}/v1/search?q=${encodeURIComponent(q)}`);
      const d=await r.json();
      if(d.ok&&d.data){
        for(const t of d.data){const k=t.address.toLowerCase();if(!tokens.find(x=>x.address.toLowerCase()===k))tokens.push(t)}
        $('content').innerHTML=d.data.length?buildTable(d.data):'<div class="empty"><i class="fa fa-search"></i>No results for "'+esc(q)+'"</div>';
      }
    }catch(e){}
  },300);
}

async function poll(){
  const age=$('ageFilter').value;
  let url=`${API}/v1/new-tokens?limit=10000`;
  if(age)url+=`&maxAge=${age}`;
  try{
    const r=await fetch(url),d=await r.json();
    if(!d.ok)throw new Error('API error');
    const fresh=d.data||[];
    newAddrs.clear();
    const isFirstLoad=seenAddrs.size===0;
    for(const t of fresh){const a=t.address.toLowerCase();if(!seenAddrs.has(a)){seenAddrs.add(a);if(!isFirstLoad)newAddrs.add(a)}}
    // Always merge — age filtering happens client-side in render()
    const m=new Map(tokens.map(t=>[t.address.toLowerCase(),t]));
    for(const t of fresh){const a=t.address.toLowerCase();m.set(a,m.has(a)?{...m.get(a),...t}:t)}
    tokens=[...m.values()];
    const addrs=tokens.slice(0,100).map(t=>t.address);
    loadRatings(addrs);
    $('stLiq').textContent=fmtNum(tokens.reduce((s,t)=>s+(parseFloat(t.liquidityUsd)||0),0));
    $('stVol').textContent=fmtNum(tokens.reduce((s,t)=>s+(parseFloat(t.volume24h)||0),0));
    if($('search').value.trim().length<2)render();
    renderTrending();
  }catch(e){console.error(e)}
}

function renderTrending(){
  const trending=[...tokens].filter(t=>parseFloat(t.volume24h)>0).sort((a,b)=>(parseFloat(b.volume24h)||0)-(parseFloat(a.volume24h)||0)).slice(0,11);
  if(!trending.length){$('trendingBox').style.display='none';return}
  $('trendingBox').style.display='block';
  const gbCard=`<a class="tcard" href="token.html?address=0xDa1Ae26f0F702DF94926042Fc1Fe1e855D376b07" style="border:2px solid var(--ac);background:var(--ac-glow)">
    <div class="tcard-top"><img class="tcard-logo" src="gitblock-logo.jpg"><div class="tcard-name" style="color:var(--ac2)">GITBLOCK ⭐</div></div>
    <div class="tcard-price">Trade on Base</div>
    <div class="tcard-vol" style="color:var(--ac2);font-weight:600">Official Token</div>
  </a>`;
  const cards=gbCard+trending.map(t=>{
    const chg=parseFloat(t.priceChange24h)||0;
    return`<a class="tcard" href="token.html?address=${t.address}">
      <div class="tcard-top">${t.image?`<img class="tcard-logo" src="${t.image}">`:`<div class="tcard-logof">?</div>`}<div class="tcard-name">${esc(t.symbol)}</div></div>
      <div class="tcard-price">${fmtPrice(t.priceUsd)}</div>
      <div class="tcard-vol">Vol: ${fmtNum(t.volume24h)}</div>
      <div class="tcard-change">${badge(t.priceChange24h)}</div>
    </a>`;
  }).join('');
  $('trendingRow').innerHTML=`<div class="trending-scroll">${cards}${cards}</div>`;
}

function sorted(data){const d=sortDir==='asc'?1:-1;return[...data].sort((a,b)=>{let va,vb;switch(sortField){case'price':va=parseFloat(a.priceUsd)||0;vb=parseFloat(b.priceUsd)||0;break;case'liquidity':va=parseFloat(a.liquidityUsd)||0;vb=parseFloat(b.liquidityUsd)||0;break;case'volume':va=parseFloat(a.volume24h)||0;vb=parseFloat(b.volume24h)||0;break;case'marketcap':va=parseFloat(a.marketCap||a.fdv)||0;vb=parseFloat(b.marketCap||b.fdv)||0;break;case'age':va=a.pairCreatedAt?new Date(a.pairCreatedAt).getTime():0;vb=b.pairCreatedAt?new Date(b.pairCreatedAt).getTime():0;break;default:return 0}return(va-vb)*d})}
function filtered(){let f=[...tokens];const q=$('search').value.toLowerCase().trim();if(q)f=f.filter(t=>t.name.toLowerCase().includes(q)||t.symbol.toLowerCase().includes(q)||t.address.toLowerCase().includes(q));return f}
function render(){if(groupedMode){renderGrouped();return}let f=filtered();f=sorted(f).slice(0,500);const age=$('ageFilter').value;if(age){const ms={'5m':3e5,'15m':9e5,'1h':36e5,'6h':216e5,'24h':864e5};const max=ms[age]||864e5;f=f.filter(t=>t.pairCreatedAt&&(Date.now()-new Date(t.pairCreatedAt).getTime())<max)}$('content').innerHTML=f.length?buildTable(f)+'<div style="text-align:center;padding:16px;color:var(--t2);font-size:.78rem">Showing '+f.length+' tokens. Search for more ↓</div>':'<div class="empty"><i class="fa fa-inbox"></i>No tokens found</div>'}
function renderGrouped(){const groups={};for(const t of tokens){const pad=t.launchpadName||t.launchpad||'Unknown';if(!groups[pad])groups[pad]={name:pad,tokens:[]};groups[pad].tokens.push(t)}const sorted=[...Object.values(groups)].sort((a,b)=>b.tokens.length-a.tokens.length);let h='';for(const g of sorted){h+=`<div style="margin-bottom:32px"><h3 style="padding:12px 0;font-size:1rem;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--brd);margin-bottom:12px"><span class="pb ${g.tokens[0]?padClass(g.tokens[0].launchpad):'po'}">${g.name}</span><span style="font-size:.8rem;color:var(--t2);font-weight:400">${g.tokens.length} tokens</span></h3>${buildTable(g.tokens.slice(0,20))}</div>`}$('content').innerHTML=h||'<div class="empty"><i class="fa fa-inbox"></i>No tokens found</div>'}
function sortBy(f){if(sortField===f)sortDir=sortDir==='asc'?'desc':'asc';else{sortField=f;sortDir=f==='age'?'asc':'desc'}render()}
function th(l,f){const a=f&&f===sortField?(sortDir==='asc'?' ▲':' ▼'):'';return f?`<th onclick="sortBy('${f}')">${l}<span style="font-size:.6rem">${a}</span></th>`:`<th>${l}</th>`}

function buildTable(data){
  let h='<table><thead><tr>'+th('#')+th('Token')+th('Rating')+th('Price','price')+th('Launched','age')+th('Liquidity','liquidity')+th('Volume 24h','volume')+th('Market Cap','marketcap')+th('Links')+'</tr></thead><tbody>';
  data.forEach((t,i)=>{
    const isNew=newAddrs.has(t.address.toLowerCase());
    const mc=t.marketCap||t.fdv;
    const launched=t.pairCreatedAt?fmtDateTime(t.pairCreatedAt):'—';
    h+=`<tr class="${isNew?'new-row':''}" onclick="location.href='token.html?address=${t.address}'">`;
    h+=`<td style="color:var(--t3)">${isNew?'<span style="color:var(--ac);font-weight:700">NEW</span>':i+1}</td>`;
    h+=`<td><div class="tc">${logo(t,'tl')}<div><div class="tn">${esc(t.name)}<span class="ts">${esc(t.symbol)}</span></div></div></div></td>`;
    h+=`<td data-rating-addr="${t.address}">${renderStars(t.address)}</td>`;
    h+=`<td><div>${fmtPrice(t.priceUsd)}</div><div style="font-size:.7rem;margin-top:1px">${badge(t.priceChange24h)}</div></td>`;
    h+=`<td style="font-size:.78rem">${launched}</td>`;
    h+=`<td>${fmtNum(t.liquidityUsd)}</td><td>${fmtNum(t.volume24h)}</td><td>${fmtNum(mc)}</td>`;
    h+=`<td><div class="sl">`;
    if(t.twitter)h+=`<a href="${t.twitter}" target="_blank" onclick="event.stopPropagation()" title="X"><i class="fa-brands fa-x-twitter"></i></a>`;
    if(t.telegram)h+=`<a href="${t.telegram}" target="_blank" onclick="event.stopPropagation()" title="TG"><i class="fa-brands fa-telegram"></i></a>`;
    if(t.website)h+=`<a href="${t.website}" target="_blank" onclick="event.stopPropagation()" title="Web"><i class="fa fa-globe"></i></a>`;
    h+=`<a href="${t.url}" target="_blank" onclick="event.stopPropagation()" title="DEXS"><i class="fa fa-chart-line"></i></a>`;
    h+=`<a href="${t.basescanUrl}" target="_blank" onclick="event.stopPropagation()" title="Scan"><i class="fa fa-search"></i></a>`;
    h+='</div></td></tr>';
  });
  return h+'</tbody></table>';
}

// Modal
let modalToken=null;

async function showDetail(addr){
  $('modal-root').innerHTML='<div class="mo"><div class="mdl"><div class="loading"><div class="flip-container"><div class="flipper"><img src="gitblock-logo.jpg" alt="GitBlock"></div></div><p>Loading token...</p></div></div></div>';
  try{
    const r=await fetch(`${API}/v1/token/${addr}`);
    const d=await r.json();
    if(!d.ok){$('modal-root').innerHTML='';alert('Token not found');return}
    modalToken=d.data;
    buildModal();
  }catch(e){$('modal-root').innerHTML='';alert('Error: '+e.message)}
}

function buildModal(){

<div class="mo" onclick="if(event.target===this)closeModal()"><div class="mdl">
  <div class="mt">
    ${logo(t,'mtl')}
    <div class="mtt">
      <h3>${esc(t.name)} <span class="sy">${esc(t.symbol)}</span>

    </div>
    <button class="mx" onclick="closeModal()">✕</button>
  </div>

    <div class="st"><div class="lb">Market Cap</div><div class="vl">${fmtNum(mc)}</div></div>
    <div class="st"><div class="lb">Liquidity</div><div class="vl">${fmtNum(t.liquidityUsd)}</div></div>
    <div class="st"><div class="lb">Volume 24h</div><div class="vl">${fmtNum(t.volume24h)}</div></div>
    <div class="st"><div class="lb">Launched</div><div class="vl" style="font-size:.85rem">${launched}</div></div>
    <div class="st"><div class="lb">DEX</div><div class="vl" style="text-transform:capitalize">${t.dex||'—'}</div></div>
    ${sec?.creatorAddress?`<div class="st"><div class="lb">Creator</div><div class="vl" style="font-family:monospace;font-size:.75rem">${sec.creatorAddress.slice(0,8)}...<a href="https://basescan.org/address/${sec.creatorAddress}" target="_blank" style="color:var(--ac2);font-size:.7rem;text-decoration:none">↗</a></div></div>`:''}
    ${t.description?`<div class="st" style="flex-basis:100%"><div class="lb">Description</div><div class="vl" style="font-size:.8rem;font-weight:400">${esc(t.description).substring(0,200)}</div></div>`:''}
  </div>
  <div class="rating-row">
    <span style="color:var(--t2)">Rate:</span>
    <span id="modal-rating">${renderStars(t.address)}</span>
  </div>
  <div class="mtb">
    <div class="tab active" onclick="switchTab('chart',this)">📈 Chart</div>
    <div class="tab" onclick="switchTab('security',this)">🛡️ Security</div>
    <div class="tab" onclick="switchTab('transactions',this)">🔄 Trades</div>
    <div class="tab" onclick="switchTab('snipers',this)">👤 Info</div>
  </div>
  <div id="tab-chart" class="tab-chart">
    <div id="lw-chart" style="width:100%;height:420px;overflow:hidden;position:relative;border-radius:0 0 12px 12px"></div>
  </div>
  <div id="tab-security" class="tab-sec" style="display:none">
    ${sec?`
      <div class="sec-overall sec-${risk}"><span class="sec-icon">${riskIcon}</span> ${riskLabel}</div>
      <div class="sec-grid">
        <div class="sec-item"><div class="lbl">Honeypot</div><div class="val ${sec.isHoneypot?'danger':'ok'}">${sec.isHoneypot?'YES – CANNOT SELL':'No'}</div></div>
        <div class="sec-item"><div class="lbl">Buy Tax</div><div class="val ${parseFloat(sec.buyTax)>5?'danger':parseFloat(sec.buyTax)>0?'warn':'ok'}">${sec.buyTax}%</div></div>
        <div class="sec-item"><div class="lbl">Sell Tax</div><div class="val ${parseFloat(sec.sellTax)>5?'danger':parseFloat(sec.sellTax)>0?'warn':'ok'}">${sec.sellTax}%</div></div>
        <div class="sec-item"><div class="lbl">Ownership</div><div class="val ${sec.isRenounced?'ok':'warn'}">${sec.isRenounced?'Renounced':'Not Renounced'}</div></div>
        <div class="sec-item"><div class="lbl">Open Source</div><div class="val ${sec.isOpenSource?'ok':'warn'}">${sec.isOpenSource?'Yes':'No'}</div></div>
        <div class="sec-item"><div class="lbl">Proxy</div><div class="val ${sec.isProxy?'warn':'ok'}">${sec.isProxy?'Yes':'No'}</div></div>
        <div class="sec-item"><div class="lbl">Can Mint</div><div class="val ${sec.canMint?'danger':'ok'}">${sec.canMint?'YES':'No'}</div></div>
        <div class="sec-item"><div class="lbl">Holders</div><div class="val">${sec.holderCount}</div></div>
      </div>
      ${sec.riskFlags&&sec.riskFlags.length?`<div class="flags">${sec.riskFlags.map(f=>`<span class="flag">⚠ ${f}</span>`).join('')}</div>`:''}
    `:'<div style="text-align:center;padding:20px;color:var(--t2)">Loading security analysis...</div>'}
  </div>

  </div>
</div></div>`;
  setTimeout(()=>loadChart(),300);
}

function buildTxnsHTML(t){
  const pd=t.pairDetail||{};
  const buy24=pd.txns24hBuys||t.buys24h||0,sell24=pd.txns24hSells||t.sells24h||0;
  const buy1h=pd.txns1hBuys||0,sell1h=pd.txns1hSells||0;
  const vol1h=pd.volume1h||t.volume1h||0;
  return`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px">
    <div style="padding:14px;background:var(--srf);border-radius:10px;text-align:center"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">24h Buys</div><div style="font-size:1.5rem;font-weight:700;color:var(--gn)">${buy24}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px;text-align:center"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">24h Sells</div><div style="font-size:1.5rem;font-weight:700;color:var(--rd)">${sell24}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px;text-align:center"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Buy/Sell Ratio</div><div style="font-size:1.5rem;font-weight:700;color:${buy24>sell24?'var(--gn)':'var(--rd)'}">${sell24>0?(buy24/sell24).toFixed(2):'∞'}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px;text-align:center"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Volume 1h</div><div style="font-size:1.2rem;font-weight:700">${fmtNum(vol1h)}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px;text-align:center"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Last Hour</div><div style="font-size:1rem;font-weight:700;color:var(--gn)">${buy1h} buys</div><div style="font-size:.85rem;color:var(--rd)">${sell1h} sells</div></div>
  </div>
  <div style="text-align:center;padding:12px;font-size:.8rem;color:var(--t2)"><i class="fa fa-info-circle"></i> Individual txns via <a href="https://dexscreener.com/base/${t.pairAddress}" target="_blank" style="color:var(--ac2);font-weight:600">DEX Screener →</a></div>`;
}

function buildSnipersHTML(t){
  const sec=t.security||{};
  return`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px">
    <div style="padding:14px;background:var(--srf);border-radius:10px"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Creator</div><div style="font-size:.82rem;font-family:monospace;font-weight:600;margin-top:4px;word-break:break-all">${sec.creatorAddress||'Unknown'}</div>${sec.creatorAddress?`<a href="https://basescan.org/address/${sec.creatorAddress}" target="_blank" style="font-size:.7rem;color:var(--ac2);text-decoration:none">View on BaseScan ↗</a>`:''}</div>
    <div style="padding:14px;background:var(--srf);border-radius:10px"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Owner</div><div style="font-size:.82rem;font-family:monospace;font-weight:600;margin-top:4px;word-break:break-all">${sec.ownerAddress||'Unknown'}</div><div style="font-size:.75rem;margin-top:4px;color:${sec.isRenounced?'var(--gn)':'var(--or)'}">${sec.isRenounced?'✅ Renounced':'⚠️ Not Renounced'}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Holder Count</div><div style="font-size:1.5rem;font-weight:700">${sec.holderCount||'—'}</div></div>
    <div style="padding:14px;background:var(--srf);border-radius:10px"><div style="font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">Total Supply</div><div style="font-size:1rem;font-weight:700;margin-top:4px;word-break:break-all">${parseFloat(sec.totalSupply||0).toLocaleString()}</div></div>
  </div>`;
}

function switchTab(name,el){
  document.querySelectorAll('.mtb .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['chart','security','transactions','snipers'].forEach(n=>{$(`tab-${n}`).style.display=n===name?'':'none'});
  if(name==='chart')setTimeout(()=>loadChart(),100);
}

async function loadChart(){
  if(!modalToken)return;
  const t=modalToken;
  const pair=t.pairAddress||t.address;
  const el=$('lw-chart');
  if(!el)return;
  el.innerHTML=`<iframe src="https://dexscreener.com/base/${pair}?embed=1&theme=dark&info=0" style="width:100%;height:470px;border:none;position:absolute;top:0;left:0" loading="lazy"></iframe>`;
}

function closeModal(){$('modal-root').innerHTML='';modalToken=null}

poll();setInterval(poll,15000);
</script>
