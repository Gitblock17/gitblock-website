<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor — GitBlock</title>
    <link rel="icon" href="assets/gitblock.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/json/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 48px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #58a6ff;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .logo img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; }
        .header-nav {
            display: flex;
            gap: 4px;
        }
        .header-nav a {
            padding: 6px 12px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .header-nav a:hover { color: #e6edf3; background: rgba(255,255,255,0.05); }
        .header-nav a.active { color: #e6edf3; background: rgba(88,166,255,0.1); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Toolbar */
        .toolbar {
            height: 40px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
        }
        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tb-btn {
            padding: 5px 12px;
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .tb-btn:hover { background: rgba(255,255,255,0.05); border-color: #484f58; }
        .tb-btn.primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        .tb-btn.primary:hover { background: #2ea043; }
        .tb-btn.danger { border-color: #da3633; color: #f85149; }
        .tb-btn.danger:hover { background: rgba(218,54,51,0.1); }
        .tb-btn.active { background: rgba(88,166,255,0.15); border-color: #58a6ff; color: #58a6ff; }

        /* Language Selector */
        .lang-select {
            padding: 4px 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .lang-select:focus { border-color: #58a6ff; }

        /* Project Name */
        .project-name-input {
            background: transparent;
            border: 1px solid transparent;
            color: #e6edf3;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            outline: none;
            min-width: 150px;
            max-width: 300px;
        }
        .project-name-input:hover { border-color: #30363d; }
        .project-name-input:focus { border-color: #58a6ff; background: #0d1117; }

        /* Main Layout */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h3 {
            font-size: 0.78rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-track { background: transparent; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

        .project-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .project-item:hover { background: rgba(255,255,255,0.04); }
        .project-item.active { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); }
        .project-item .pi-info { flex: 1; min-width: 0; }
        .project-item .pi-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: #e6edf3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .project-item .pi-meta {
            font-size: 0.68rem;
            color: #8b949e;
            margin-top: 2px;
        }
        .project-item .pi-delete {
            padding: 4px;
            background: transparent;
            border: none;
            color: #484f58;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.72rem;
            opacity: 0;
            transition: all 0.15s;
        }
        .project-item:hover .pi-delete { opacity: 1; }
        .project-item .pi-delete:hover { color: #f85149; background: rgba(248,81,73,0.1); }

        .sidebar-empty {
            padding: 24px 16px;
            text-align: center;
            color: #484f58;
            font-size: 0.82rem;
        }

        /* Editor + Output Split */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panels {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Editor Panel */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }
        .editor-panel .CodeMirror {
            flex: 1;
            height: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Output Panel */
        .output-panel {
            width: 45%;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #30363d;
            background: #0d1117;
        }
        .output-tabs {
            display: flex;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }
        .output-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #8b949e;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .output-tab:hover { color: #e6edf3; }
        .output-tab.active { color: #e6edf3; border-bottom-color: #58a6ff; }
        .output-tab .error-badge {
            padding: 1px 6px;
            background: #da3633;
            color: #fff;
            border-radius: 10px;
            font-size: 0.65rem;
            display: none;
        }
        .output-tab .error-badge.visible { display: inline; }

        .output-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .output-pane {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            overflow: auto;
        }
        .output-pane.active { display: block; }

        /* Console Output */
        .console-output {
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
        }
        .console-line {
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 2px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .console-line:hover { background: rgba(255,255,255,0.03); }
        .console-line .cl-prefix {
            color: #484f58;
            font-size: 0.7rem;
            min-width: 14px;
            padding-top: 2px;
        }
        .console-line .cl-content {
            flex: 1;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .console-line.log .cl-content { color: #e6edf3; }
        .console-line.info .cl-content { color: #58a6ff; }
        .console-line.warn { background: rgba(210,153,34,0.08); }
        .console-line.warn .cl-content { color: #d29922; }
        .console-line.error { background: rgba(218,54,51,0.08); }
        .console-line.error .cl-content { color: #f85149; }
        .console-line .cl-time {
            color: #484f58;
            font-size: 0.68rem;
            min-width: 60px;
            text-align: right;
        }

        /* HTML Preview */
        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* AI Panel */
        .ai-panel {
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .ai-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .ai-msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            line-height: 1.6;
        }
        .ai-msg.user {
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.15);
            margin-left: 24px;
        }
        .ai-msg.assistant {
            background: rgba(35,134,54,0.08);
            border: 1px solid rgba(35,134,54,0.15);
            margin-right: 24px;
        }
        .ai-msg pre {
            background: #161b22;
            border-radius: 6px;
            padding: 10px;
            margin: 6px 0;
            overflow-x: auto;
        }
        .ai-msg pre code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: #e6edf3;
        }
        .ai-input-row {
            display: flex;
            gap: 8px;
        }
        .ai-input {
            flex: 1;
            padding: 10px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .ai-input:focus { border-color: #58a6ff; }
        .ai-send {
            padding: 10px 16px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .ai-send:hover { background: #2ea043; }

        /* Resize Handle */
        .resize-handle {
            width: 4px;
            background: #30363d;
            cursor: col-resize;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .resize-handle:hover { background: #58a6ff; }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 56px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: toastIn 0.2s ease, toastOut 0.2s ease 2.5s forwards;
        }
        .toast.success { background: #238636; }
        .toast.error { background: #da3633; }
        .toast.info { background: #1f6feb; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(20px); } }

        /* Link Share Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
